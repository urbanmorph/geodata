<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <!-- SEO_HEAD -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🗺%3C/text%3E%3C/svg%3E" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0b0b0d" media="(prefers-color-scheme: dark)" />
    <style>
      :root {
        --fg: #111; --muted: #6b7280; --bg: #fff; --card-bg: #fafafa;
        --line: #e5e7eb; --accent: #0a58ca; --ok: #166534; --warn: #d97706; --err: #b91c1c;
      }
      @media (prefers-color-scheme: dark) {
        :root { --fg: #f0f0f0; --muted: #9ca3af; --bg: #0b0b0d; --card-bg: #15151a;
          --line: #26262d; --accent: #4da3ff; --ok: #3fb96b; --warn: #f59e0b; --err: #ef4444; }
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; background: var(--bg); color: var(--fg); font: 14px/1.5 ui-sans-serif, system-ui, sans-serif; }
      body { display: grid; grid-template-rows: auto 1fr; height: 100vh; }
      header.top {
        padding: 12px 18px; border-bottom: 1px solid var(--line);
        display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
      }
      header.top h1 { font-size: 14px; font-weight: 600; margin: 0; }
      header.top .muted { color: var(--muted); font-weight: 400; margin-left: 6px; }
      header.top .controls { display: flex; align-items: center; gap: 10px; }
      header.top a { color: var(--muted); text-decoration: none; font-size: 13px; }
      header.top a:hover { color: var(--fg); }
      header.top a.btn {
        padding: 6px 12px; border: 1px solid var(--accent); border-radius: 6px;
        color: var(--accent); font-weight: 500;
      }
      header.top a.btn:hover { background: var(--accent); color: #fff; }
      input[type=file] {
        font: 13px ui-sans-serif, system-ui, sans-serif;
        padding: 5px 8px; border: 1px solid var(--line); border-radius: 6px;
        background: var(--bg); color: var(--fg); cursor: pointer;
      }
      main { display: grid; grid-template-columns: 1fr min(360px, 32%); min-height: 0; }
      #map { position: relative; min-width: 0; }
      #drop.dragover::after {
        content: "Drop the file to render";
        position: absolute; inset: 0;
        display: flex; align-items: center; justify-content: center;
        background: color-mix(in srgb, var(--accent) 14%, transparent);
        font-weight: 600; color: var(--accent); pointer-events: none;
        border: 3px dashed var(--accent); z-index: 10;
      }
      aside {
        border-left: 1px solid var(--line); padding: 18px 20px;
        overflow-y: auto; background: var(--card-bg);
      }
      aside h2 {
        font-size: 11px; font-weight: 600; letter-spacing: .08em;
        text-transform: uppercase; color: var(--muted); margin: 0 0 12px;
      }
      .kv { display: flex; justify-content: space-between; gap: 10px; padding: 4px 0; font-size: 13px; }
      .kv .k { color: var(--muted); }
      .kv .v { font-weight: 500; font-variant-numeric: tabular-nums; text-align: right; }
      .kv.sub { padding-left: 12px; font-size: 12px; }
      .kv.warn .v { color: var(--warn); }
      .kv.warn .k::before { content: "⚠ "; }
      .loading, .error, .empty { color: var(--muted); font-size: 13px; padding: 8px 0; }
      .error { color: var(--err); }
      .empty { font-style: italic; }
      .helper { color: var(--muted); font-size: 12px; line-height: 1.5; margin-top: 24px; padding-top: 16px; border-top: 1px dashed var(--line); }
      .helper code { font: 11px ui-monospace, SFMono-Regular, monospace; background: var(--bg); padding: 1px 4px; border-radius: 3px; }
      @media (max-width: 720px) {
        main { grid-template-columns: 1fr; grid-template-rows: 60vh 1fr; }
        aside { border-left: none; border-top: 1px solid var(--line); }
      }
    </style>
  </head>
  <body>
    <header class="top">
      <h1><a href="/" style="color:inherit;text-decoration:none">geodata</a> <span class="muted">· verify</span></h1>
      <div class="controls">
        <input type="file" id="file" accept=".geojson,.json,.kml,.kmz,.parquet" aria-label="Choose a geo file to verify" />
        <a href="/">← back</a>
      </div>
    </header>
    <main id="drop">
      <div id="map"></div>
      <aside>
        <h2>Validation</h2>
        <div id="sidebar">
          <div class="empty">Drop a file anywhere on the map, or use the picker above.</div>
        </div>
        <div class="helper">
          <strong>Accepts:</strong> <code>.geojson</code> · <code>.kml</code> ·
          <code>.kmz</code> · <code>.parquet</code><br />
          Everything runs in your browser — nothing is uploaded.<br />
          <br />
          Shareable preview: append <code>?url=https://example.com/file.geojson</code>
          to load a remote CORS-permissive file.
        </div>
      </aside>
    </main>
    <script type="module" src="/src/verify.ts"></script>
  </body>
</html>
